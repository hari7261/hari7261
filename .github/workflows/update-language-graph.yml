name: Update Language Usage Graph

on:
  workflow_dispatch:
  schedule:
    - cron: "15 2 * * *"

permissions:
  contents: write

jobs:
  update-language-graph:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Ensure auth token exists
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_PAT" ]; then
            echo "GH_PAT secret is missing."
            echo "Add GH_PAT (repo scope) so language data includes private repositories accurately."
            exit 1
          fi

      - name: Generate graph and data
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          python .github/scripts/generate_language_graph.py \
            --username hari7261 \
            --output-svg images/language-usage.svg \
            --output-json images/language-usage.json \
            --max-languages 12 \
            --exclude-forks

      - name: Commit and push updates
        run: |
          if git diff --quiet -- images/language-usage.svg images/language-usage.json; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add images/language-usage.svg images/language-usage.json
          git commit -m "chore: update language usage graph"
          git push
